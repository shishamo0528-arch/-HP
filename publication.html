<main>
     <div class="name-of-title">
    <div class="for-design"></div>
    <h1>論文等</h1>
    </div>
  <div class="container">
    <div class="tabs" id="tabs"></div>
    <div class="content">
      <ul id="list"></ul>
    </div>
  </div>

<script>
  const url = "https://script.google.com/macros/s/AKfycbyO1URRYiJYMwigcN35ooxEk5LPXqv0iiUW3rCR1Mo44cIa0DlizhQ_2FMMZyJDXGOueg/exec";

fetch(url)
  .then(res => res.json()) 
  .then(data => init(data));


function init(data) {
  const tabs = document.getElementById("tabs");
  const list = document.getElementById("list");

  const years = Object.keys(data).sort((a, b) => b - a);

  years.forEach((year, i) => {
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.textContent = year + "年";

    if (i === 0) tab.classList.add("active");

    tab.onclick = () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      show(year);
    };

    tabs.appendChild(tab);
  });

  function show(year) {
    list.innerHTML = "";
    data[year].forEach(text => {
      const li = document.createElement("li");
      li.textContent = text;
      list.appendChild(li);
    });
  }

  show(years[0]);
}
</script>
